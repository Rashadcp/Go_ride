services:
  redis:
    image: redis:7-alpine
    container_name: goride-redis
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: goride-backend
    volumes:
      - ./backend:/app
      - backend_modules:/app/node_modules
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - redis
    restart: always

# Simplified for local development hybrid mode:
# - Frontend: Runs locally (npm run dev)
# - MongoDB: MongoDB Atlas
# - Backend: Docker (goride-backend)
# - Redis: Docker (goride-redis mapped to 6380)

volumes:
  redis_data:
  backend_modules:

