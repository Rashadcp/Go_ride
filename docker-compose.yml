version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: goride-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: goride-backend
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    environment:
      # Overriding MONGO_URI to use the local container name instead of the cloud URI
      # If you want to use the cloud DB instead, comment out the line below
      - MONGO_URI=mongodb://mongodb:27017/goride
    depends_on:
      - mongodb
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: goride-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  mongodb_data:
