services:
  redis:
    image: redis:7-alpine
    container_name: goride-redis-prod
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_prod_data:/data
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    container_name: goride-backend-prod
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=https://goride.vercel.app # Change this after Vercel deployment
    depends_on:
      - redis
    restart: always

volumes:
  redis_prod_data:
